name: Build Okteta Windows (Craft on Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: kdeorg/craft-windows-qt6:latest
    steps:
      - name: Checkout Okteta source
        uses: actions/checkout@v4
        with:
          repository: KDE/okteta
          fetch-depth: 1

      - name: Build with Craft
        shell: bash
        run: |
          source /craft/craftenv.sh
          craft --no-cache okteta

      - name: Package portable build
        shell: bash
        run: |
          mkdir -p dist
          cp -r /craft/windows-msvc2019_64-cl-release/bin dist/
          cp -r /craft/windows-msvc2019_64-cl-release/lib dist/
          cp -r /craft/windows-msvc2019_64-cl-release/plugins dist/
          cp -r /craft/windows-msvc2019_64-cl-release/share dist/
          mkdir -p dist/okteta-windows
          mv dist/bin dist/lib dist/plugins dist/share dist/okteta-windows/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: okteta-windows-latest
          path: dist/
