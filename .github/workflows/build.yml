name: Build Windows Qt5

on:
  push:
    paths-ignore:
      - README.md
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 UCRT64 & Qt5
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            make
            cmake
            ninja
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-qt5
            mingw-w64-ucrt-x86_64-qt5-tools
            mingw-w64-ucrt-x86_64-extra-cmake-modules
            mingw-w64-ucrt-x86_64-kf5-coreaddons
            mingw-w64-ucrt-x86_64-kf5-i18n
            mingw-w64-ucrt-x86_64-kf5-config
            mingw-w64-ucrt-x86_64-kf5-xmlgui
            mingw-w64-ucrt-x86_64-kf5-widgetsaddons
            mingw-w64-ucrt-x86_64-kf5-kio
            mingw-w64-ucrt-x86_64-kf5-parts
            mingw-w64-ucrt-x86_64-kf5-crash
            mingw-w64-ucrt-x86_64-icoutils

      - name: Build CMake
        run: |
          rm -rf build && mkdir build && cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DOCS=OFF \
            -DBUILD_TESTING=OFF \
            -DBUILD_PO=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_Qt6=ON \
            -DCMAKE_CXX_FLAGS="-Wno-attributes -Wno-free-nonheap-object -fno-inline"

      - name: Compile
        run: |
          ninja -C build

      - name: Copy EXE
        run: |
          mkdir -p output
          cp build/bin/*.exe output/ 2>/dev/null
          cp build/program/*.exe output/ 2>/dev/null

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-qt5-build
          path: output/
