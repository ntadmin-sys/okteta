name: Build Okteta Windows (Ubuntu + Craft)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kdeorg/craft-windows-qt6:latest
    timeout-minutes: 90

    steps:
      - name: Checkout latest Okteta
        uses: actions/checkout@v4
        with:
          repository: KDE/okteta
          fetch-depth: 1

      - name: Build Okteta (Windows Qt6)
        shell: bash
        run: |
          source /craft/craftenv.sh
          craft -i okteta

      - name: Collect all files (portable)
        shell: bash
        run: |
          mkdir -p upload
          cp -r /craft/windows-msvc2019_64-cl-release/* upload/
          ls -la upload/bin/

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: okteta-windows-latest
          path: upload/
