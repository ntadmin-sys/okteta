name: Build Windows with Craft (KF6 Qt6)

on:
  push:
    paths-ignore: [README.md]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install KDE Craft
        shell: pwsh
        run: |
          git clone https://invent.kde.org/packaging/craft.git
          mkdir C:\CraftRoot

      - name: Setup Craft
        shell: cmd
        run: |
          set CRAFT_ROOT=C:\CraftRoot
          python craft/craft.py --install qtbase
          python craft/craft.py --install extra-cmake-modules
          python craft/craft.py --install kf6coreaddons
          python craft/craft.py --install kf6i18n
          python craft/craft.py --install kf6config
          python craft/craft.py --install kf6xmlgui
          python craft/craft.py --install kf6widgetsaddons
          python craft/craft.py --install kf6kio
          python craft/craft.py --install kf6parts
          python craft/craft.py --install kf6crash

      - name: Build with Craft
        shell: cmd
        run: |
          set CRAFT_ROOT=C:\CraftRoot
          call C:\CraftRoot\craft\craftenv.cmd
          mkdir build
          cd build
          cmake .. -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DBUILD_DOCS=OFF ^
            -DBUILD_TESTING=OFF ^
            -DBUILD_PO=OFF ^
            -DBUILD_WITH_QT6=ON ^
            -DQT_MAJOR_VERSION=6
          ninja

      - name: Copy EXE
        shell: pwsh
        run: |
          mkdir output
          cp build/bin/*.exe output/ 2>$null
          cp build/program/*.exe output/ 2>$null
          cp build/*.exe output/ 2>$null

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: kde-craft-windows-kf6
          path: output/
